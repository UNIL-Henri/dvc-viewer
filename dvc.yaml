stages:
  tests:
    cmd: PYTHONPATH=. uv run pytest tests/ -v
    always_changed: true

  generate_fake_output:
    cmd: echo "Fake research output generated at $(date)" > fake_output.txt
    always_changed: true
    outs:
      - fake_output.txt

  verify_gdrive_sync:
    cmd: python3 scripts/verify_gdrive.py
    deps:
      - fake_output.txt
      - scripts/verify_gdrive.py
